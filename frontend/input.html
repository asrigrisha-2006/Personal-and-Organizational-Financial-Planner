<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinPlan – Add Data</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="brand-nav">₹ FinPlan</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="input.html" class="active">Add Data</a>
      <a href="reports.html">Reports</a>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-container">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="showSection('income', this)">+ Income</button>
      <button class="tab-btn" onclick="showSection('expense', this)">+ Expense</button>
      <button class="tab-btn" onclick="showSection('goal', this)">+ Goal</button>
      <button class="tab-btn" onclick="showSection('investment', this)">+ Investment Plan</button>
    </div>

    <!-- Income Form -->
    <div id="section-income" class="form-section">
      <h3>Add Income</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Source</label>
          <input type="text" id="inc-source" placeholder="e.g. Salary, Freelance">
        </div>
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" id="inc-amount" placeholder="50000">
        </div>
        <div class="form-group">
          <label>Month</label>
          <select id="inc-month">
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="inc-year" value="2025">
        </div>
      </div>
      <button class="btn-primary" onclick="addIncome()">Add Income</button>
      <div id="inc-msg" class="msg"></div>
    </div>

    <!-- Expense Form -->
    <div id="section-expense" class="form-section hidden">
      <h3>Add Expense</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Category</label>
          <select id="exp-category">
            <option>Food</option><option>Travel</option><option>Rent</option>
            <option>Utilities</option><option>Entertainment</option>
            <option>Healthcare</option><option>Education</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" id="exp-amount" placeholder="5000">
        </div>
        <div class="form-group">
          <label>Month</label>
          <select id="exp-month">
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="exp-year" value="2025">
        </div>
      </div>
      <button class="btn-primary" onclick="addExpense()">Add Expense</button>
      <div id="exp-msg" class="msg"></div>
    </div>

    <!-- Goal Form -->
    <div id="section-goal" class="form-section hidden">
      <h3>Add Financial Goal</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Goal Type</label>
          <input type="text" id="goal-type" placeholder="e.g. House, Car, Travel">
        </div>
        <div class="form-group">
          <label>Target Amount (₹)</label>
          <input type="number" id="goal-amount" placeholder="1000000">
        </div>
        <div class="form-group">
          <label>Target Year</label>
          <input type="number" id="goal-year" placeholder="2028">
        </div>
      </div>
      <button class="btn-primary" onclick="addGoal()">Add Goal</button>
      <div id="goal-msg" class="msg"></div>
    </div>

    <!-- Investment Plan Form -->
    <div id="section-investment" class="form-section hidden">
      <h3>Set Investment Plan</h3>
      <p class="muted" style="margin-bottom:16px">Percentages must add up to 100%</p>
      <div class="form-grid">
        <div class="form-group">
          <label>Month</label>
          <select id="inv-month">
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="inv-year" value="2025">
        </div>
        <div class="form-group">
          <label>Stocks %</label>
          <input type="number" id="inv-stocks" placeholder="30" oninput="updateTotal()">
        </div>
        <div class="form-group">
          <label>Mutual Funds %</label>
          <input type="number" id="inv-mf" placeholder="30" oninput="updateTotal()">
        </div>
        <div class="form-group">
          <label>Fixed Deposit %</label>
          <input type="number" id="inv-fd" placeholder="20" oninput="updateTotal()">
        </div>
        <div class="form-group">
          <label>Emergency Fund %</label>
          <input type="number" id="inv-ef" placeholder="20" oninput="updateTotal()">
        </div>
        <div class="form-group">
          <label>Risk Level</label>
          <select id="inv-risk">
            <option>Low</option><option selected>Medium</option><option>High</option>
          </select>
        </div>
      </div>
      <div class="total-bar">
        Total: <span id="inv-total">0</span>% 
        <span id="total-status"></span>
      </div>
      <button class="btn-primary" onclick="addInvestment()">Save Plan</button>
      <div id="inv-msg" class="msg"></div>
    </div>
  </div>
  <script src="js/input.js"></script>
</body>
</html>
