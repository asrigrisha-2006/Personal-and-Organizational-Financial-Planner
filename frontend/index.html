<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinPlan – Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">₹</div>
      <h1>FinPlan</h1>
      <p>Your personal & organizational financial planner</p>
    </div>

    <div class="tab-switcher">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <form id="login-form" class="auth-form">
      <input type="email" id="login-email" placeholder="Email" required>
      <input type="password" id="login-password" placeholder="Password" required>
      <button type="submit" class="btn-primary">Login</button>
    </form>

    <form id="signup-form" class="auth-form hidden">
      <input type="text" id="reg-name" placeholder="Full Name" required>
      <input type="email" id="reg-email" placeholder="Email" required>
      <input type="tel" id="reg-phone" placeholder="Phone">
      <input type="password" id="reg-password" placeholder="Password" required>
      <select id="reg-type">
        <option value="Individual">Individual</option>
        <option value="Org_Admin">Organization Head</option>
        <option value="Org_User">Org Member</option>
      </select>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
    <div id="auth-msg" class="msg"></div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
